<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" width="760" height="420" viewBox="0 0 760 420">
<title id="title">Coverage-breadth trade-off</title>
<desc id="desc">Primary exact policies: greater susceptibility coincided with broader use</desc>
<rect width="760" height="420" rx="18" fill="#f4efe3"/>
<text x="42" y="42" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#142936">Coverage-breadth trade-off</text>
<text x="42" y="66" font-family="Georgia, serif" font-size="13" fill="#667277">Primary exact policies: greater susceptibility coincided with broader use</text>
<line x1="80.0" y1="100" x2="80.0" y2="340" stroke="#d9d0bf"/>
<text x="80.0" y="364" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#667277">60%</text>
<line x1="232.5" y1="100" x2="232.5" y2="340" stroke="#d9d0bf"/>
<text x="232.5" y="364" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#667277">70%</text>
<line x1="385.0" y1="100" x2="385.0" y2="340" stroke="#d9d0bf"/>
<text x="385.0" y="364" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#667277">80%</text>
<line x1="537.5" y1="100" x2="537.5" y2="340" stroke="#d9d0bf"/>
<text x="537.5" y="364" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#667277">90%</text>
<line x1="690.0" y1="100" x2="690.0" y2="340" stroke="#d9d0bf"/>
<text x="690.0" y="364" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#667277">100%</text>
<line x1="80" y1="340.0" x2="690" y2="340.0" stroke="#d9d0bf"/>
<text x="70" y="344.0" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#667277">96%</text>
<line x1="80" y1="280.0" x2="690" y2="280.0" stroke="#d9d0bf"/>
<text x="70" y="284.0" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#667277">97%</text>
<line x1="80" y1="220.0" x2="690" y2="220.0" stroke="#d9d0bf"/>
<text x="70" y="224.0" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#667277">98%</text>
<line x1="80" y1="160.0" x2="690" y2="160.0" stroke="#d9d0bf"/>
<text x="70" y="164.0" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#667277">99%</text>
<line x1="80" y1="100.0" x2="690" y2="100.0" stroke="#d9d0bf"/>
<text x="70" y="104.0" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#667277">100%</text>
<circle cx="149.3" cy="305.1" r="7" fill="#142936" stroke="#f4efe3" stroke-width="2"/>
<text x="141.3" y="293.1" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#142936">Classical</text>
<circle cx="690.0" cy="114.2" r="7" fill="#a44a2d" stroke="#f4efe3" stroke-width="2"/>
<text x="682.0" y="102.2" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#a44a2d">Robust 0.024</text>
<circle cx="690.0" cy="114.2" r="7" fill="#a44a2d" stroke="#f4efe3" stroke-width="2"/>
<text x="682.0" y="102.2" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#a44a2d">Robust 0.048</text>
<circle cx="690.0" cy="114.2" r="7" fill="#a44a2d" stroke="#f4efe3" stroke-width="2"/>
<text x="682.0" y="102.2" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#a44a2d">Robust 0.071</text>
<circle cx="690.0" cy="114.2" r="7" fill="#a44a2d" stroke="#f4efe3" stroke-width="2"/>
<text x="682.0" y="102.2" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#a44a2d">Robust 0.095</text>
<text x="385.0" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#142936">Carbapenem-use rate</text>
<text x="20" y="220.0" transform="rotate(-90 20 220.0)" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#142936">Raw susceptibility</text>
</svg>
